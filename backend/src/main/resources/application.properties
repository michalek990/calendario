spring.application.name=hrnest-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/hrnest
spring.datasource.username=hrnest
spring.datasource.password=hrnest
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-min-32-bytes-long}
app.jwt.expiration-ms=86400000

# Wysylka e-maili (np. decyzje o wnioskach urlopowych) wylaczona domyslnie -
# LoggingEmailSender loguje zamiast wysylac, dopoki ktos swiadomie nie ustawi
# MAIL_ENABLED=true i danych SMTP w produkcji.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@calendario.local}
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
