spring.application.name=hrnest-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/hrnest
spring.datasource.username=hrnest
spring.datasource.password=hrnest
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-min-32-bytes-long}
app.jwt.expiration-ms=86400000
